services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: medusa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: medusa-store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medusa_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: medusa_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - medusa_network

  # Medusa Server
  # This service runs the Medusa backend application
  # and the admin dashboard.
  medusa:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: medusa_backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "9000:9000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/medusa-store
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    volumes:
      - shared_config:/shared
    networks:
      - medusa_network

  # Medusa Storefront
  storefront:
    build:
      context: ./my-medusa-storefront
    container_name: medusa_storefront
    restart: unless-stopped
    depends_on:
      - medusa
    ports:
      - "8000:8000"
    env_file:
      - ./my-medusa-storefront/.env
    environment:
      - NODE_ENV=production
      - MEDUSA_BACKEND_URL=http://medusa:9000
    volumes:
      - shared_config:/shared
    networks:
      - medusa_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.27-alpine
    container_name: medusa_nginx
    restart: unless-stopped
    depends_on:
      - medusa
      - storefront
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - medusa_network

volumes:
  postgres_data:
  shared_config:

networks:
  medusa_network:
    driver: bridge