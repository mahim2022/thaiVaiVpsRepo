services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: medusa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: medusa-store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medusa_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: medusa_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - medusa_network

  # Medusa Server
  # This service runs the Medusa backend application
  # and the admin dashboard.
  medusa:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: medusa_backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "9000:9000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/medusa-store
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    volumes:
      - shared_config:/shared
      - medusa_static:/server/static
    networks:
      - medusa_network

  # Medusa Storefront
  storefront:
    build:
      context: ./my-medusa-storefront
    container_name: medusa_storefront
    restart: unless-stopped
    depends_on:
      - medusa
    ports:
      - "8000:8000"
    env_file:
      - ./my-medusa-storefront/.env
    environment:
      - NODE_ENV=production
      - MEDUSA_BACKEND_URL=http://medusa:9000
    volumes:
      - shared_config:/shared
    networks:
      - medusa_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.27-alpine
    container_name: medusa_nginx
    restart: unless-stopped
    depends_on:
      - medusa
      - storefront
    ports:
      - "80:80"
      - "443:443"
    command:
      - /bin/sh
      - -c
      - |
        set -e
        mkdir -p /etc/nginx/certs
        if [ ! -f /etc/nginx/certs/server.crt ] || [ ! -f /etc/nginx/certs/server.key ]; then
          apk add --no-cache openssl >/dev/null
          openssl req -x509 -nodes -days 365 \
            -newkey rsa:2048 \
            -keyout /etc/nginx/certs/server.key \
            -out /etc/nginx/certs/server.crt \
            -subj "/CN=summithire.tech" \
            -addext "subjectAltName=DNS:summithire.tech,DNS:www.summithire.tech"
        fi
        exec nginx -g 'daemon off;'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs
    networks:
      - medusa_network

volumes:
  postgres_data:
  shared_config:
  medusa_static:

networks:
  medusa_network:
    driver: bridge