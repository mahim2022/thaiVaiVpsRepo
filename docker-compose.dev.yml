services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: medusa-store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - medusa_network_dev

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - medusa_network_dev

  medusa:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "9000:9000"
      - "5173:5173"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/medusa-store
      - REDIS_URL=redis://redis:6379
      - MEDUSA_BACKEND_URL=http://localhost:9000
      - MEDUSA_FILE_BACKEND_URL=http://localhost:9000/static
      - STORE_CORS=http://localhost:8000,http://127.0.0.1:8000
      - ADMIN_CORS=http://localhost:5173,http://localhost:9000,http://127.0.0.1:5173,http://127.0.0.1:9000
      - AUTH_CORS=http://localhost:5173,http://localhost:9000,http://127.0.0.1:5173,http://127.0.0.1:9000
      - COOKIE_SECURE=false
    volumes:
      - .:/server
      - medusa_node_modules:/server/node_modules
      - medusa_medusa:/server/.medusa
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:9000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - medusa_network_dev

  storefront:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    depends_on:
      medusa:
        condition: service_healthy
      postgres:
        condition: service_started
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=development
      - MEDUSA_BACKEND_URL=http://medusa:9000
      - NEXT_PUBLIC_BASE_URL=http://localhost:8000
      - DEV_DATABASE_URL=postgres://postgres:postgres@postgres:5432/medusa-store
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./my-medusa-storefront:/app
      - storefront_node_modules:/app/node_modules
    command: ["sh", "/app/start.dev.sh"]
    networks:
      - medusa_network_dev

volumes:
  postgres_data_dev:
  medusa_node_modules:
  medusa_medusa:
  storefront_node_modules:

networks:
  medusa_network_dev:
    driver: bridge
